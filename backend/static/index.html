<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASM 在线实验平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise"></div>

<header>
    <div class="header-inner">
        <div class="logo">
            <span class="logo-icon">&Sigma;</span>
            <div class="logo-text">
                <h1>ASM<span class="logo-dot">.</span></h1>
                <span class="subtitle">x86 汇编实验平台</span>
            </div>
        </div>
        <nav class="header-nav">
            <a href="https://github.com/ChenyuHeee/asm-web" target="_blank" rel="noopener" class="nav-link" title="GitHub 仓库">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                <span class="nav-label">源码</span>
            </a>
            <a href="https://hechenyu.xin/courses/asm/" target="_blank" rel="noopener" class="nav-link" title="课程笔记">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                <span class="nav-label">笔记</span>
            </a>
        </nav>
        <div class="header-meta">
            <span class="meta-badge">TASM</span>
            <span class="meta-sep">·</span>
            <span class="meta-badge">DOSBox</span>
        </div>
    </div>
</header>

<div class="main">
    <div class="editor-panel">
        <div class="toolbar">
            <div class="toolbar-left">
                <button id="btn-run" class="btn-run">
                    <span class="btn-icon">&#9654;</span>
                    <span class="btn-label">运行</span>
                    <span class="btn-hint">Ctrl+Enter</span>
                </button>
                <div class="select-wrap">
                    <select id="select-example" class="select" aria-label="选择示例">
                        <option value="">示例程序</option>
                    </select>
                    <span class="select-arrow">&#9662;</span>
                </div>
            </div>
            <span id="status" class="status" aria-live="polite"></span>
        </div>

        <div id="editor-container"></div>

        <div class="input-area" id="input-area">
            <div class="input-header">
                <label for="input-text">标准输入</label>
                <span class="input-hint">程序需要键盘输入时在此填写</span>
            </div>
            <textarea id="input-text" rows="2" placeholder="例如: 输入字符或数字..."></textarea>
        </div>
    </div>

    <div class="output-panel">
        <div class="output-header">
            <div class="output-title">
                <span class="output-dot"></span>
                <span>输出</span>
            </div>
            <button id="btn-clear" class="btn-clear">清空</button>
        </div>
        <div class="output-body">
            <pre id="output" aria-live="polite"></pre>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
<script src="app.js"></script>
</body>
</html>
